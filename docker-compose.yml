services:
  # Redis server with fs.so module
  redis:
    build:
      context: .
      dockerfile: Dockerfile.redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # MCP server (HTTP transport, connects to Redis)
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    ports:
      - "${AFS_MCP_PORT:-8089}:8089"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8089/health').status == 200 else 1)",
        ]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
